<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Learning Stats 🇯🇵</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container { max-width: 500px; width: 100%; }

    .stats-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      padding: 30px;
      text-align: center;
      position: relative;
    }

    .character-image {
      width: 120px; height: 120px; border-radius: 50%;
      border: 5px solid white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin: 0 auto 15px; display: block; object-fit: cover;
    }

    .card-title {
      color: white; font-size: 24px; font-weight: bold;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .lang-badge {
      position: absolute; top: 12px; right: 14px;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; font-weight: 700; color: white; letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card-body { padding: 30px; }

    .config-panel {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 18px;
      display: grid;
      gap: 10px;
    }

    .field { display: grid; gap: 4px; }
    .field label {
      font-size: 11px;
      font-weight: 700;
      color: #4a5568;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .field input {
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      color: #2d3748;
      outline: none;
    }
    .field input:focus { border-color: #667eea; }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .hint {
      color: #718096;
      font-size: 12px;
    }

    .stats-grid { display: grid; gap: 15px; }

    .stat-item {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 20px; border-radius: 15px;
      display: flex; justify-content: space-between; align-items: center;
      transition: transform 0.2s, box-shadow 0.2s; cursor: default;
    }
    .stat-item:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .stat-item.known    { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
    .stat-item.learning { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
    .stat-item.new      { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); }

    .stat-label {
      font-size: 16px; font-weight: 600; color: #333;
      display: flex; align-items: center; gap: 8px;
    }
    .stat-icon { font-size: 24px; }
    .stat-value { font-size: 32px; font-weight: bold; color: #2d3748; }

    .loading { text-align: center; padding: 40px; color: #718096; }
    .spinner {
      border: 3px solid #f3f3f3; border-top: 3px solid #667eea;
      border-radius: 50%; width: 40px; height: 40px;
      animation: spin 1s linear infinite; margin: 0 auto 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #fed7d7; color: #c53030; padding: 15px;
      border-radius: 10px; margin: 20px; text-align: center;
    }

    .total-section {
      margin-top: 20px; padding-top: 20px;
      border-top: 2px solid #e2e8f0; text-align: center;
    }
    .total-label { color: #718096; font-size: 14px; margin-bottom: 5px; }
    .total-value {
      font-size: 48px; font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .refresh-hint {
      text-align: center; margin-top: 12px;
      font-size: 11px; color: #a0aec0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="stats-card">
      <div class="card-header">
        <img src="images/Kobayashi.webp" alt="Kobayashi" class="character-image" />
        <h1 class="card-title">
          <span>🇯🇵</span>
          Japanese Learning Progress
          <span>🇯🇵</span>
        </h1>
        <span class="lang-badge" id="lang-badge">ja</span>
      </div>
      <div class="card-body">
        <div class="config-panel">
          <div class="field">
            <label>Migoku Server URL</label>
            <input type="text" id="server-url" value="http://localhost:8080" />
          </div>
          <div class="field">
            <label>API Key (X-Api-Key)</label>
            <input type="password" id="api-key" placeholder="Paste your API key" autocomplete="off" />
          </div>
          <div class="field">
            <label>Language Code</label>
            <input type="text" id="lang-input" value="ja" placeholder="ja, zh, es..." />
          </div>
          <div class="controls">
            <button class="btn" id="load-btn">Load Stats</button>
            <span class="hint">Auto-refreshes every 30 s after successful load.</span>
          </div>
        </div>

        <div id="cardBody">
          <div class="loading">
            <p>Enter your settings and click <strong>Load Stats</strong>.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  const cardBody = document.getElementById('cardBody');
  const langBadge = document.getElementById('lang-badge');
  const loadBtn = document.getElementById('load-btn');
  let refreshTimer;

  function esc(v) {
    return String(v ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function getConfig() {
    return {
      serverUrl: document.getElementById('server-url').value.trim().replace(/\/+$/, ''),
      apiKey: document.getElementById('api-key').value.trim(),
      lang: (document.getElementById('lang-input').value.trim() || 'ja').toLowerCase(),
    };
  }

  function showLoading() {
    cardBody.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading your stats...</p>
      </div>`;
  }

  function showError(message) {
    cardBody.innerHTML = `<div class="error">${message}</div>`;
  }

  async function fetchStats() {
    const { serverUrl, apiKey, lang } = getConfig();
    if (!serverUrl) {
      showError('Please enter a Migoku server URL.');
      return false;
    }

    langBadge.textContent = lang;
    showLoading();

    try {
      const headers = {};
      if (apiKey) headers['X-Api-Key'] = apiKey;

      const res = await fetch(
        `${serverUrl}/api/v1/status/counts?lang=${encodeURIComponent(lang)}`,
        { headers }
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      displayStats(await res.json());
      return true;
    } catch (err) {
      console.error('fetchStats:', err);
      showError(
        `Failed to load stats. Make sure Migoku is running at <strong>${esc(serverUrl)}</strong> and your API key is valid.`
      );
      return false;
    }
  }

  function displayStats(data) {
    const s = data[0] || {};
    const known    = s.known_count    || 0;
    const learning = s.learning_count || 0;
    const unknown  = s.unknown_count  || 0;
    const ignored  = s.ignored_count  || 0;
    const total    = known + learning + unknown + ignored;

    cardBody.innerHTML = `
      <div class="stats-grid">
        <div class="stat-item known">
          <div class="stat-label"><span class="stat-icon">✓</span> Known</div>
          <div class="stat-value">${known.toLocaleString()}</div>
        </div>
        <div class="stat-item learning">
          <div class="stat-label"><span class="stat-icon">→</span> Learning</div>
          <div class="stat-value">${learning.toLocaleString()}</div>
        </div>
        <div class="stat-item new">
          <div class="stat-label"><span class="stat-icon">◯</span> Unknown</div>
          <div class="stat-value">${unknown.toLocaleString()}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label"><span class="stat-icon">✕</span> Ignored</div>
          <div class="stat-value">${ignored.toLocaleString()}</div>
        </div>
      </div>
      <div class="total-section">
        <div class="total-label">Total Words</div>
        <div class="total-value">${total.toLocaleString()}</div>
      </div>
      <div class="refresh-hint">Auto-refreshes every 30 s</div>`;
  }

  loadBtn.addEventListener('click', async () => {
    const ok = await fetchStats();
    if (!ok) return;
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(fetchStats, 30_000);
  });
</script>
</body>
</html>
